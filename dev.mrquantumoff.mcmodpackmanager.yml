# @format

# Example Flatpak Manifest
# This repacks the published Electron AppImage into a Flatpak-friendly layout
# and launches it through the Electron BaseApp + zypak wrapper.
app-id: dev.mrquantumoff.mcmodpackmanager
runtime: org.freedesktop.Platform
runtime-version: "25.08"
sdk: org.freedesktop.Sdk
base: org.electronjs.Electron2.BaseApp
base-version: "25.08"
command: run_quadrant

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --share=network
  - --device=dri
  - --filesystem=home
  - --env=ELECTRON_TRASH=gio
  - --env=XCURSOR_PATH=/run/host/user-share/icons:/run/host/share/icons
  - --talk-name=org.freedesktop.secrets
  - --talk-name=org.freedesktop.Notifications
  - --talk-name=org.kde.StatusNotifierWatcher

modules:
  - shared-modules/libappindicator/libappindicator-gtk3-12.10.json
  - name: Quadrant
    buildsystem: simple
    sources:
      - type: file
        url: https://github.com/quadrantmc/quadrant/raw/v26.6.0-stable/dev.mrquantumoff.mcmodpackmanager.metainfo.xml
        sha256: 1803f686b9420e63aecb379d476a995259e1a86262f469a7d7884441df01ec4c
      - type: file
        url: https://github.com/quadrantmc/quadrant/releases/download/v26.6.0-stable/Quadrant-26.6.0-stable-linux-x86_64-electron.AppImage
        sha256: c20abf34a02f32493a42b7857b856404bb4b27e126b0b39488135c1091c407bb
        only-arches: [x86_64]
      - type: file
        url: https://github.com/quadrantmc/quadrant/releases/download/v26.6.0-stable/Quadrant-26.6.0-stable-linux-arm64-electron.AppImage
        sha256: 5de9fd91105e25618b716fe5e7b1c17804f6b8bbb0ea6ed9a562d68cd51f73dd
        only-arches: [aarch64]

    build-commands:
      - |
        set -eu
        appimage="$(echo Quadrant-*-linux-*-electron.AppImage)"
        chmod +x "$appimage"
        ./"$appimage" --appimage-extract
      - |
        set -eu
        desktop_file="$(find squashfs-root -name '*.desktop' | head -n 1)"
        if [ -z "$desktop_file" ]; then
          echo "Could not find a desktop file in the extracted AppImage." >&2
          exit 1
        fi

        exec_name=""
        for candidate in squashfs-root/usr/bin/*; do
          if [ -f "$candidate" ] && [ -x "$candidate" ]; then
            exec_name="$(basename "$candidate")"
            break
          fi
        done

        if [ -z "$exec_name" ]; then
          exec_name="$(sed -n 's/^Exec=\([^[:space:]]*\).*/\1/p' "$desktop_file" | head -n 1)"
        fi

        if [ -z "$exec_name" ]; then
          echo "Could not determine the Electron executable name." >&2
          exit 1
        fi

        find_electron_binary() {
          for candidate in "$@"; do
            [ -f "$candidate" ] || continue
            [ -x "$candidate" ] || continue

            case "$(basename "$candidate")" in
              AppRun|chrome-sandbox|chrome_crashpad_handler|*.so)
                continue
                ;;
            esac

            if file "$candidate" | grep -q 'ELF'; then
              printf '%s\n' "$candidate"
              return 0
            fi
          done

          return 1
        }

        app_exec_source="$(
          find_electron_binary \
            "squashfs-root/${exec_name}" \
            squashfs-root/quadrant-next \
            squashfs-root/Quadrant \
            "squashfs-root/usr/bin/${exec_name}" \
            squashfs-root/* \
            squashfs-root/usr/bin/* || true
        )"

        if [ -z "$app_exec_source" ]; then
          echo "Could not find the Electron ELF binary in the extracted AppImage." >&2
          exit 1
        fi

        app_exec_path="/app/lib/quadrant/${app_exec_source#squashfs-root/}"

        install -dm755 /app/lib/quadrant /app/bin
        cp -a squashfs-root/. /app/lib/quadrant/

        asar_file="$(find /app/lib/quadrant -path '*/resources/app.asar' | head -n 1)"
        if [ -n "$asar_file" ]; then
          patch-desktop-filename "$asar_file"
        fi

        cat > /app/bin/run_quadrant <<EOF
        #!/bin/sh
        set -eu
        export TMPDIR="\${XDG_RUNTIME_DIR}/app/\${FLATPAK_ID}"
        APP_EXEC="${app_exec_path}"
        if [ ! -x "\$APP_EXEC" ]; then
          echo "Quadrant executable missing: \$APP_EXEC" >&2
          exit 1
        fi
        exec zypak-wrapper "\$APP_EXEC" --ozone-platform-hint=auto "\$@"
        EOF
        chmod 0755 /app/bin/run_quadrant
      - |
        set -eu
        desktop_file="$(find /app/lib/quadrant -name '*.desktop' | head -n 1)"
        desktop-file-edit \
          --set-key=Exec --set-value="run_quadrant %u" \
          --set-key=Icon --set-value=dev.mrquantumoff.mcmodpackmanager \
          "$desktop_file"
        install -Dm644 "$desktop_file" /app/share/applications/dev.mrquantumoff.mcmodpackmanager.desktop
      - |
        set -eu
        icons="$(find /app/lib/quadrant \( -path '*/icons/hicolor/*/apps/*.png' -o -path '*/icons/hicolor/*/apps/*.svg' \) | sort)"
        if [ -n "$icons" ]; then
          printf '%s\n' "$icons" | while IFS= read -r icon; do
            size="$(basename "$(dirname "$(dirname "$icon")")")"
            ext="${icon##*.}"
            install -Dm644 "$icon" "/app/share/icons/hicolor/${size}/apps/dev.mrquantumoff.mcmodpackmanager.${ext}"
          done
        else
          fallback_icon="$(find /app/lib/quadrant -maxdepth 1 -type f \( -name '*.png' -o -name '*.svg' \) | head -n 1)"
          if [ -z "$fallback_icon" ]; then
            echo "Could not find an icon in the extracted AppImage." >&2
            exit 1
          fi
          ext="${fallback_icon##*.}"
          install -Dm644 "$fallback_icon" "/app/share/icons/hicolor/512x512/apps/dev.mrquantumoff.mcmodpackmanager.${ext}"
        fi
      - install -Dm644 dev.mrquantumoff.mcmodpackmanager.metainfo.xml /app/share/metainfo/dev.mrquantumoff.mcmodpackmanager.metainfo.xml
